name: '🐛 BUG反馈'
description: 向我们反馈你遇到的错误
title: "[BUG]: "
labels: ["bug", "DEV-需要注意", "DEV-未经测试"]
assignees: "DuckDuckStudio"
body:
  - type: checkboxes
    attributes:
      label: 在继续之前，请确认以下内容
      description: 在发布您的问题之前，请确认以下内容。
      options:
        - label: 我已经搜索过已存在的问题，并没有存在相同的正在进行中/重复/已解决的问题
          required: true
  - type: dropdown
    attributes:
      label: 选择一个问题类别
      description: 你遇到了什么样的问题?
      options:
        - 工作流错误
        - 依赖错误
        - 使用问题
        - 错误返回
        - 其他
    validations:
      required: true
  - type: textarea
    attributes:
      label: 描述你遇到的问题
      placeholder: 请在此简要描述您的问题
    validations:
      required: true
  - type: textarea
    attributes:
      label: 描述如何重现你遇到的问题
      placeholder: 如何重现该问题？(填写此字段对问题调查很有帮助!)
    validations:
      required: true
  - type: textarea
    attributes:
      label: 实际行为
      placeholder: 你遇到的情况是什么样的
    validations:
      required: false
  - type: textarea
    attributes:
      label: 预期行为
      placeholder: 正常情况下应该是什么样的
    validations:
      required: true
  - type: textarea
    attributes:
      label: 屏幕截图或日志 (可选)
      description: 请上传你记录的日志/屏幕截图，因为它们将帮助我们找到问题的根本原因。如果有复现视频最好了！
    validations:
      required: false
